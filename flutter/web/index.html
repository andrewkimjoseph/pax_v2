    <script id="splash-screen-script">
      function removeSplashFromWeb() {
        const splash = document.getElementById("splash");
        const flutterApp = document.getElementById("flutter-app");

        if (splash) {
          // Make Flutter app visible first
          if (flutterApp) {
            flutterApp.classList.add("ready");
          }

          // Add fade-out class for smooth transition
          splash.classList.add("fade-out");

          // Remove element after animation completes
          setTimeout(function () {
            splash.remove();
            document.getElementById("splash-branding")?.remove();
            // Keep white background to prevent flash
            document.body.style.background = "#ffffff";
          }, 300);
        } else {
          // If already removed, just clean up
          document.getElementById("splash-branding")?.remove();
          if (flutterApp) {
            flutterApp.classList.add("ready");
          }
          document.body.style.background = "#ffffff";
        }
      }
    </script>

    <!-- Remove splash screen when Flutter content is ready -->
    <script>
      let splashRemoved = false;
      let minSplashTime = 800; // Minimum time splash should be visible (ms)
      let splashStartTime = Date.now();
      let flutterReady = false;

      function canRemoveSplash() {
        // Check if Flutter app has rendered actual content
        const flutterApp = document.getElementById("flutter-app");
        if (!flutterApp) return false;

        // Look for Flutter's rendered content (canvas or scene host)
        const hasCanvas = flutterApp.querySelector("canvas");
        const hasSceneHost = flutterApp.querySelector("flt-scene-host");
        const hasFlutterContent =
          hasCanvas ||
          hasSceneHost ||
          (flutterApp.children.length > 0 && flutterApp.offsetHeight > 0);

        // Check if minimum display time has passed
        const timeElapsed = Date.now() - splashStartTime;
        const minTimePassed = timeElapsed >= minSplashTime;

        // Only remove if Flutter is ready, has content, and minimum time passed
        return flutterReady && hasFlutterContent && minTimePassed;
      }

      function tryRemoveSplash() {
        if (splashRemoved) return;

        if (canRemoveSplash()) {
          splashRemoved = true;
          removeSplashFromWeb();
        } else {
          // Check again soon
          setTimeout(tryRemoveSplash, 100);
        }
      }

      // Listen for Flutter first frame event
      window.addEventListener("flutter-first-frame", function () {
        flutterReady = true;
        // Wait a bit for content to fully render, then try to remove
        setTimeout(tryRemoveSplash, 300);
      });

      // Also watch for Flutter app content
      const observer = new MutationObserver(function (mutations) {
        if (!flutterReady) {
          const flutterApp = document.getElementById("flutter-app");
          if (flutterApp && flutterApp.children.length > 0) {
            flutterReady = true;
            setTimeout(tryRemoveSplash, 200);
          }
        }
      });

      const flutterAppContainer = document.getElementById("flutter-app");
      if (flutterAppContainer) {
        observer.observe(flutterAppContainer, {
          childList: true,
          subtree: true,
          attributes: true,
        });
      }

      // Fallback: Remove splash after maximum time (prevents it staying forever)
      setTimeout(function () {
        if (!splashRemoved) {
          splashRemoved = true;
          removeSplashFromWeb();
        }
      }, 5000); // Maximum 5 seconds
    </script>
